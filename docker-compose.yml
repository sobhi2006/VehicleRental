version: "3.9"

services:
  db:
    image: mysql
    container_name: mysql-car-rental
    environment:
      - MYSQL_ROOT_PASSWORD=sa123456sa
      - MYSQL_DATABASE=CarRentalDb
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    
  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: car-rental-project
    ports:
      - "5000:5000"
    depends_on:
      - db
    environment:
      - ASPNETCORE_URLS=http://+:5000
      - ConnectionStrings:DefaultConnection=Server=db;Port=3306;Database=CarRentalDb;User=root;Password=sa123456sa

volumes:
  mysql_data: